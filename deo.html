<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VR KINGS — DeoVR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#d4a843;--bg:#07080b;--text:#e8e0d0;--muted:rgba(232,224,208,.45);--border:rgba(212,168,67,.18)}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{max-width:480px;width:100%;text-align:center}
.logo{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);opacity:.7;margin-bottom:2rem}
h1{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;margin-bottom:.6rem}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:2.5rem;line-height:1.7}
.btn-main{display:flex;align-items:center;justify-content:center;gap:.7rem;background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.4);color:var(--gold);padding:1rem 2.4rem;border-radius:99px;font-size:.85rem;text-decoration:none;cursor:pointer;transition:all .25s;font-family:'Outfit',sans-serif;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem;width:100%}
.btn-main:hover{background:rgba(212,168,67,.2)}
.btn-copy{display:flex;align-items:center;justify-content:center;gap:.5rem;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:.7rem 1.6rem;border-radius:99px;font-size:.78rem;cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:.08em;text-transform:uppercase;width:100%;margin-bottom:.5rem}
.divider{height:1px;background:var(--border);margin:1.5rem 0}
.step{display:flex;gap:.9rem;margin-bottom:.9rem;align-items:flex-start;text-align:left}
.n{width:22px;height:22px;border-radius:50%;background:rgba(212,168,67,.1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--gold);flex-shrink:0;margin-top:.15rem}
.st{font-size:.8rem;color:var(--muted);line-height:1.55}
.st strong{color:var(--text)}
.url-box{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;font-size:.7rem;color:rgba(255,255,255,.35);word-break:break-all;text-align:left;line-height:1.7;margin-bottom:1.2rem}
.copied-msg{color:var(--gold);font-size:.75rem;margin-bottom:1rem;min-height:1.2rem}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
  <div class="logo">🌐 VR KINGS</div>
  <div id="main-content">
    <h1>Open in <em style="color:var(--gold)">DeoVR</em></h1>
    <p class="sub" id="vid-title">Tap to launch DeoVR and watch in your headset</p>
    <a id="deovr-btn" href="#" class="btn-main">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><circle cx="9" cy="12" r="2"/><circle cx="15" cy="12" r="2"/></svg>
      Open in DeoVR
    </a>
    <div class="divider"></div>
    <p style="font-size:.72rem;color:var(--muted);margin-bottom:1rem;text-align:left">Button didn't work? Open DeoVR app → Browser → paste this URL:</p>
    <div class="url-box" id="url-display">—</div>
    <button class="btn-copy" onclick="copyUrl()">📋 Copy URL</button>
    <div class="copied-msg" id="copied-msg"></div>
  </div>
  <div id="no-url" style="display:none">
    <h1>No video URL</h1>
    <p class="sub">Go back and use the DeoVR button in the player.</p>
  </div>
</div>

<script>
var p = new URLSearchParams(window.location.search);
var videoUrl = p.get('v');
var title = p.get('title') || 'VR KINGS';
var is180 = p.get('type') === 'sbs' || p.get('type') === '180';

if (!videoUrl) {
  // Немає URL — показуємо помилку
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('no-url').style.display = 'block';

} else if (p.get('html') !== '1') {
  // ── ГОЛОВНА ЛОГІКА ──────────────────────────────────────────────────────
  // Якщо є ?v= і немає ?html=1 — ЗАВЖДИ повертаємо JSON.
  // DeoVR відкриває цю сторінку і отримує JSON → грає як справжнє VR.
  // ?html=1 використовується тільки для показу UI (кнопка, інструкція).
  var deoJson = {
    "title": title,
    "is3d": true,
    "screenType": is180 ? "dome" : "sphere",
    "stereoMode": is180 ? "sbs" : "mono",
    "skipIntro": 0,
    "videoLength": 0,
    "encodings": [{
      "name": "h264",
      "videoSources": [{"resolution": 3840, "url": videoUrl}]
    }]
  };
  // Замінюємо всю сторінку на чистий JSON
  document.documentElement.innerHTML = JSON.stringify(deoJson);

} else {
  // ── UI режим (?html=1) — для телефонів/ПК ───────────────────────────────
  if (title !== 'VR KINGS') document.getElementById('vid-title').textContent = title;

  // URL для DeoVR Browser — БЕЗ ?html=1, щоб отримати JSON
  var deoJsonUrl = window.location.href.replace('&html=1','').replace('?html=1','');
  document.getElementById('url-display').textContent = deoJsonUrl;

  // Deep link
  var btn = document.getElementById('deovr-btn');
  btn.href = 'deovr://' + deoJsonUrl;
  btn.onclick = function(e) {
    e.preventDefault();
    window.location.href = 'deovr://' + deoJsonUrl;
  };
}

function copyUrl() {
  var url = document.getElementById('url-display').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(showCopied);
  } else {
    var t = document.createElement('textarea');
    t.value = url; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
    showCopied();
  }
}
function showCopied() {
  var msg = document.getElementById('copied-msg');
  msg.textContent = '✓ Copied!';
  setTimeout(function(){ msg.textContent = ''; }, 2500);
}
</script>
</body>
</html>
