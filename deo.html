<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VR KINGS — DeoVR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#d4a843;--bg:#07080b;--text:#e8e0d0;--muted:rgba(232,224,208,.45);--border:rgba(212,168,67,.18)}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{max-width:480px;width:100%;text-align:center}
.logo{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);opacity:.7;margin-bottom:2rem}
h1{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;margin-bottom:.6rem}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:2.5rem;line-height:1.7}
.btn-main{display:flex;align-items:center;justify-content:center;gap:.7rem;background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.4);color:var(--gold);padding:1rem 2.4rem;border-radius:99px;font-size:.85rem;text-decoration:none;cursor:pointer;transition:all .25s;font-family:'Outfit',sans-serif;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem;width:100%}
.ua-box{background:rgba(212,168,67,.06);border:1px solid var(--border);border-radius:10px;padding:1rem;font-size:.7rem;color:rgba(255,255,255,.6);word-break:break-all;text-align:left;line-height:1.7;margin-bottom:1.2rem}
.ua-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
  <div class="logo">🔍 DEBUG MODE</div>
  <h1>User <em style="color:var(--gold)">Agent</em></h1>
  <p class="sub">Відкрий цю сторінку в окулярах через DeoVR.<br>Скажи що написано нижче.</p>

  <div class="ua-box">
    <div class="ua-label">User-Agent:</div>
    <div id="ua-text">завантаження...</div>
  </div>

  <div class="ua-box">
    <div class="ua-label">URL параметри:</div>
    <div id="params-text">—</div>
  </div>
</div>

<script>
document.getElementById('ua-text').textContent = navigator.userAgent || '(порожньо)';
document.getElementById('params-text').textContent = window.location.search || '(немає)';
</script>
</body>
</html>
